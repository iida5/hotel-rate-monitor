<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホテル別イベントタイムライン</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- SVGアイコン定義 (rateshop.html と同じ流儀。currentColor を継承) -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <symbol id="i-logo" viewBox="0 0 24 24">
      <rect x="3" y="9" width="10" height="12" rx="1"/>
      <path d="M6.5 12.5h1M9.5 12.5h1M6.5 15.5h1M9.5 15.5h1M8 21v-2.5"/>
      <path d="M16 9a4.5 4.5 0 0 1 4.5 4.5"/>
      <path d="M16 5a8.5 8.5 0 0 1 8 8" transform="scale(0.92)"/>
    </symbol>
    <symbol id="i-clock" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </symbol>
    <symbol id="i-bed" viewBox="0 0 24 24">
      <path d="M2 4v16"/>
      <path d="M2 8h18a2 2 0 0 1 2 2v10"/>
      <path d="M2 17h20"/>
      <path d="M6 8v9"/>
    </symbol>
    <symbol id="i-bell" viewBox="0 0 24 24">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </symbol>
    <symbol id="i-filter" viewBox="0 0 24 24">
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
    </symbol>
    <symbol id="i-db" viewBox="0 0 24 24">
      <ellipse cx="12" cy="5" rx="9" ry="3"/>
      <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
      <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
    </symbol>
    <symbol id="i-info" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="16" x2="12" y2="12"/>
      <line x1="12" y1="8" x2="12.01" y2="8"/>
    </symbol>
    <symbol id="i-back" viewBox="0 0 24 24">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </symbol>
  </svg>

  <header>
    <div class="brand">
      <span class="logo-box"><svg class="ico ico-logo"><use href="#i-clock"/></svg></span>
      <div>
        <h1>イベントタイムライン</h1>
        <p class="subtitle">ホテルごとに「いつ何をしたか」を時系列で振り返る</p>
      </div>
    </div>
    <div class="header-right">
      <a class="settings-btn" href="/"><svg class="ico"><use href="#i-back"/></svg>監視ダッシュボード</a>
      <span class="badge"><svg class="ico"><use href="#i-db"/></svg><span id="mode-badge">モード: ---</span></span>
      <span id="clock" class="clock">--:--:--</span>
    </div>
  </header>

  <main class="tl-main">
    <!-- 左カラム: ホテル一覧 -->
    <aside class="panel tl-hotels">
      <div class="panel-head"><h2>ホテル</h2></div>
      <ul id="hotel-list" class="tl-hotel-list"><li class="muted">読み込み中…</li></ul>
    </aside>

    <!-- 右カラム: フィルタ + タイムライン -->
    <section class="tl-content">
      <div class="panel">
        <div class="panel-head">
          <h2><svg class="ico head-ico"><use href="#i-filter"/></svg>フィルタ</h2>
          <span class="muted" id="event-count"></span>
        </div>
        <div class="tl-filters">
          <div class="tl-field">
            <div class="rs-ctl-label">期間</div>
            <div class="chiprow" id="period-chips"></div>
          </div>
          <div class="tl-field tl-field-adults hidden" id="adults-field">
            <div class="rs-ctl-label">宿泊人数</div>
            <div class="chiprow" id="adults-chips"></div>
          </div>
          <div class="tl-field">
            <label class="rs-ctl-label" for="date-filter">チェックイン日</label>
            <select id="date-filter" class="rs-select"><option value="">すべて</option></select>
          </div>
          <div class="tl-field">
            <label class="rs-ctl-label" for="room-filter">部屋タイプ</label>
            <select id="room-filter" class="rs-select"><option value="">すべて</option></select>
          </div>
          <div class="tl-field tl-field-types">
            <div class="rs-ctl-label">イベント種別</div>
            <div class="chiprow" id="type-chips"></div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2><svg class="ico head-ico"><use href="#i-clock"/></svg><span id="tl-caption">タイムライン</span></h2>
        </div>
        <div id="timeline" class="tl-timeline">
          <p class="muted">左のホテルを選んでください。</p>
        </div>
        <p class="hint"><svg class="ico ico-sm"><use href="#i-info"/></svg><span id="tl-note">値上げ・値下げ・売止・販売再開・在庫増減・セール/ポイントの履歴をホテル単位でまとめています。</span></p>
      </div>
    </section>
  </main>

  <script src="timeline.js"></script>
</body>
</html>
