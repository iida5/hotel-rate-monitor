<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ホテル競合レート監視ダッシュボード</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- SVGアイコン定義 (stroke は CSS の currentColor を継承) -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <symbol id="i-logo" viewBox="0 0 24 24">
      <rect x="3" y="9" width="10" height="12" rx="1"/>
      <path d="M6.5 12.5h1M9.5 12.5h1M6.5 15.5h1M9.5 15.5h1M8 21v-2.5"/>
      <path d="M16 9a4.5 4.5 0 0 1 4.5 4.5"/>
      <path d="M16 5a8.5 8.5 0 0 1 8 8" transform="scale(0.92)"/>
    </symbol>
    <symbol id="i-clock" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </symbol>
    <symbol id="i-bed" viewBox="0 0 24 24">
      <path d="M2 4v16"/>
      <path d="M2 8h18a2 2 0 0 1 2 2v10"/>
      <path d="M2 17h20"/>
      <path d="M6 8v9"/>
    </symbol>
    <symbol id="i-trophy" viewBox="0 0 24 24">
      <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
      <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
      <path d="M4 22h16"/>
      <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
      <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
      <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
    </symbol>
    <symbol id="i-bell" viewBox="0 0 24 24">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </symbol>
    <symbol id="i-gear" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </symbol>
    <symbol id="i-filter" viewBox="0 0 24 24">
      <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
    </symbol>
    <symbol id="i-db" viewBox="0 0 24 24">
      <ellipse cx="12" cy="5" rx="9" ry="3"/>
      <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
      <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
    </symbol>
    <symbol id="i-info" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="16" x2="12" y2="12"/>
      <line x1="12" y1="8" x2="12.01" y2="8"/>
    </symbol>
  </svg>

  <header>
    <div class="brand">
      <span class="logo-box"><svg class="ico ico-logo"><use href="#i-logo"/></svg></span>
      <div>
        <h1>競合レート監視</h1>
        <p class="subtitle">競合ホテルの価格改定・在庫変動をリアルタイム検知</p>
      </div>
    </div>
    <div class="header-right">
      <span class="badge"><svg class="ico"><use href="#i-db"/></svg><span id="mode-badge">モード: ---</span></span>
      <span id="conn" class="conn"><span class="dot"></span>接続中...</span>
      <span id="clock" class="clock">--:--:--</span>
      <button id="settings-btn" class="settings-btn" title="監視設定"><svg class="ico"><use href="#i-gear"/></svg>設定</button>
    </div>
  </header>

  <main>
    <!-- 左カラム: KPI + 価格比較グリッド -->
    <section class="col-left">
      <div class="kpis kpis-4">
        <div class="kpi">
          <span class="kpi-head"><span class="kpi-ico blue"><svg class="ico"><use href="#i-clock"/></svg></span><span class="kpi-label">価格改定 (直近1時間)</span></span>
          <span class="kpi-value" id="kpi-price">--</span>
          <span class="kpi-delta">競合ホテルのみ</span>
        </div>
        <div class="kpi">
          <span class="kpi-head"><span class="kpi-ico green"><svg class="ico"><use href="#i-bed"/></svg></span><span class="kpi-label">売止/満室セル</span></span>
          <span class="kpi-value" id="kpi-soldout">--</span>
          <span class="kpi-delta" id="kpi-soldout-sub"></span>
        </div>
        <div class="kpi">
          <span class="kpi-head"><span class="kpi-ico yellow"><svg class="ico"><use href="#i-trophy"/></svg></span><span class="kpi-label" id="kpi-best-label">直近泊 競合最安</span></span>
          <span class="kpi-value" id="kpi-best">--</span>
          <span class="kpi-delta" id="kpi-best-sub"></span>
        </div>
        <div class="kpi">
          <span class="kpi-head"><span class="kpi-ico red"><svg class="ico"><use href="#i-bell"/></svg></span><span class="kpi-label">アラート (24時間)</span></span>
          <span class="kpi-value alert" id="kpi-alerts">--</span>
          <span class="kpi-delta">価格・在庫・売止の検知数</span>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>価格比較グリッド <span class="muted">(セル: 最低価格 / 残室)</span></h2>
          <div class="grid-head-right">
            <div class="chiprow adults-tabs hidden" id="adults-tabs"></div>
          </div>
        </div>
        <div class="rs-scan"><span class="rs-radar" id="radar"></span><span id="scan-text">接続待ち...</span></div>
        <div class="rs-progress hidden" id="scan-progress" title="今回の巡回で取得済みのセル数">
          <div class="rs-progress-track"><div class="rs-progress-bar" id="scan-progress-bar"></div></div>
          <span class="rs-progress-label" id="scan-progress-label"></span>
        </div>
        <div class="rs-grid-wrap">
          <table class="rs-grid" id="grid"></table>
        </div>
        <p class="hint"><svg class="ico ico-sm"><use href="#i-info"/></svg><span id="grid-note"></span></p>
      </div>
    </section>

    <!-- 右カラム: アラート設定 + フィード -->
    <aside class="col-right">
      <div class="panel">
        <div class="panel-head">
          <h2><svg class="ico head-ico"><use href="#i-gear"/></svg>アラート設定</h2>
        </div>
        <div class="rs-controls">
          <div>
            <div class="rs-ctl-label">検知する変動の種類</div>
            <div class="chiprow" id="type-chips"></div>
          </div>
          <div>
            <label class="rs-ctl-label" for="threshold">価格変動のしきい値</label>
            <select id="threshold" class="rs-select">
              <option value="0">すべての改定</option>
              <option value="3">±3%以上</option>
              <option value="5">±5%以上</option>
              <option value="10">±10%以上</option>
            </select>
          </div>
          <div class="rs-ctl-row">
            <label class="rs-ctl-label rs-check"><input type="checkbox" id="show-own"> 自社の変動も表示</label>
            <button id="notify-btn" class="chip notify">🔔 デスクトップ通知: OFF</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>変動アラート <span class="muted" id="alert-count"></span></h2>
          <span class="icon-btn" title="フィルタは上の「アラート設定」"><svg class="ico"><use href="#i-filter"/></svg></span>
        </div>
        <div id="feed-summary" class="rs-summary hidden"></div>
        <ul id="alerts" class="rs-feed"></ul>
      </div>
    </aside>
  </main>

  <!-- 推移チャートモーダル (グリッドのセルクリックで開く) -->
  <div id="history-overlay" class="overlay hidden">
    <div class="modal modal-wide" role="dialog" aria-modal="true" aria-labelledby="history-title">
      <div class="modal-head">
        <h2 id="history-title"><svg class="ico head-ico"><use href="#i-clock"/></svg><span id="history-caption">価格推移</span></h2>
        <span class="modal-head-right">
          <a id="history-link" class="rs-link hidden" target="_blank" rel="noopener">楽天で開く ↗</a>
          <button id="history-close" class="icon-btn close-x" title="閉じる">✕</button>
        </span>
      </div>
      <div class="modal-body" id="history-body">
        <p class="muted">読み込み中…</p>
      </div>
    </div>
  </div>

  <!-- 監視設定モーダル -->
  <div id="settings-overlay" class="overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="modal-head">
        <h2 id="settings-title"><svg class="ico head-ico"><use href="#i-gear"/></svg>監視設定</h2>
        <button id="settings-close" class="icon-btn close-x" title="閉じる">✕</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span class="field-label">監視施設</span>
          <span class="field-hint">楽天トラベルの施設番号。1行に1件 (またはカンマ区切り)。ホテルページURL <code>travel.rakuten.co.jp/HOTEL/施設番号/</code> の数字</span>
          <textarea id="cfg-hotels" rows="5" spellcheck="false" placeholder="16169&#10;142783&#10;178248"></textarea>
        </label>
        <label class="field">
          <span class="field-label">自社施設</span>
          <span class="field-hint">監視施設のうち1つ。KPIの「競合最安 vs 自社」比較や、自社の変動を通知から除く判定に使います</span>
          <select id="cfg-own" class="rs-select"></select>
        </label>
        <label class="field">
          <span class="field-label">監視するチェックイン日</span>
          <span class="field-hint">今日から何日後か (<code>0</code>=今夜)。カンマ区切り (例: 0,1,2,3,7,14,30)。最大14件</span>
          <input id="cfg-dates" type="text" inputmode="numeric" placeholder="0,1,3,7,14,30">
        </label>
        <div class="field-row">
          <label class="field">
            <span class="field-label">空室検索する宿泊人数</span>
            <span class="field-hint">1〜10名。カンマ区切りで最大3条件を並行監視 (例 <code>1,2</code>)</span>
            <input id="cfg-adults" type="text" inputmode="numeric" placeholder="1,2">
          </label>
          <label class="field">
            <span class="field-label">ブラウザの並列ページ数</span>
            <span class="field-hint">1〜10。多いほど速いがブロックされやすい</span>
            <input id="cfg-concurrency" type="number" min="1" max="10" step="1">
          </label>
        </div>
        <p id="settings-msg" class="settings-msg"></p>
      </div>
      <div class="modal-foot">
        <button id="settings-cancel" class="btn">キャンセル</button>
        <button id="settings-save" class="btn primary">保存して再起動</button>
      </div>
    </div>
  </div>

  <script src="rateshop.js"></script>
</body>
</html>
