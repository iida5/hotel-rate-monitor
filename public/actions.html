<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>競合アクション (ランキング & ストーリー)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <symbol id="i-rank" viewBox="0 0 24 24"><line x1="4" y1="20" x2="4" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="20" y1="20" x2="20" y2="14"/></symbol>
    <symbol id="i-story" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.2"/><circle cx="3.5" cy="12" r="1.2"/><circle cx="3.5" cy="18" r="1.2"/></symbol>
    <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></symbol>
    <symbol id="i-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></symbol>
    <symbol id="i-db" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></symbol>
    <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></symbol>
    <symbol id="i-back" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></symbol>
  </svg>

  <header>
    <div class="brand">
      <span class="logo-box"><svg class="ico ico-logo"><use href="#i-rank"/></svg></span>
      <div>
        <h1>競合アクション</h1>
        <p class="subtitle">いちばん動いている競合のランキングと、チェックイン日ごとの出来事の流れ</p>
      </div>
    </div>
    <div class="header-right">
      <a class="settings-btn" href="/"><svg class="ico"><use href="#i-back"/></svg>ダッシュボード</a>
      <a class="settings-btn" href="/heatmap.html"><svg class="ico"><use href="#i-db"/></svg>差額ヒートマップ</a>
      <span class="badge"><svg class="ico"><use href="#i-db"/></svg><span id="mode-badge">モード: ---</span></span>
      <span id="clock" class="clock">--:--:--</span>
    </div>
  </header>

  <section class="cb-main">
    <div class="panel">
      <div class="panel-head">
        <h2><svg class="ico head-ico"><use href="#i-info"/></svg>表示条件</h2>
        <span class="muted" id="range-note"></span>
      </div>
      <div class="tl-filters">
        <div class="tl-field">
          <div class="rs-ctl-label">期間</div>
          <div class="chiprow" id="period-chips"></div>
        </div>
        <div class="tl-field tl-field-adults hidden" id="adults-field">
          <div class="rs-ctl-label">宿泊人数</div>
          <div class="chiprow" id="adults-chips"></div>
        </div>
      </div>
    </div>

    <!-- ランキング -->
    <div class="panel">
      <div class="panel-head">
        <h2><svg class="ico head-ico"><use href="#i-rank"/></svg>競合アクションランキング</h2>
        <span class="muted" id="rank-note"></span>
      </div>
      <div class="cb-wrap">
        <table class="rk-table" id="ranking"></table>
      </div>
      <p class="hint"><svg class="ico ico-sm"><use href="#i-info"/></svg><span>期間内のイベント回数をホテル別に集計。バーは総アクション数。値下げ・売止が多い競合ほど積極的に動いています。</span></p>
    </div>

    <!-- イベントストーリー -->
    <div class="panel">
      <div class="panel-head">
        <h2><svg class="ico head-ico"><use href="#i-story"/></svg><span id="story-caption">イベントストーリー</span></h2>
        <label class="rs-ctl-label story-date-label">チェックイン日
          <select id="story-date" class="rs-select"></select>
        </label>
      </div>
      <div id="story" class="st-feed"><p class="muted">読み込み中…</p></div>
      <p class="hint"><svg class="ico ico-sm"><use href="#i-info"/></svg><span>選んだチェックイン日の出来事を古い順に。直前に他社が同方向へ動いていれば「追随」、自社最安を割れば「自社を下回る」を表示します。</span></p>
    </div>
  </section>

  <script src="rateshop-common.js"></script>
  <script src="actions.js"></script>
</body>
</html>
